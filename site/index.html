<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Door Opener</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0; /*remove default browser spacing*/
      height: 100vh; /*vh: viewport height*/
      display: flex;
      justify-content: center;
      align-items: center;
    }
    button {
      padding: 24px 48px;
      font-size: 1.2rem;
    }
    .container {
      text-align: center;
      font-family: "Lucida Console", monospace; 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .ble-status {
      font-family: "Lucida Console", monospace;
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Some funny quip (forgot im not funny)</h1>
    <p>Version 1.0.3</p>

    <button id="connect-btn">CONNECT</button>
    <button id="open-btn">OPEN</button>
    <button id="close-btn">CLOSE</button>
    <button id="reset-btn">RESET</button>
    <p id="last-command">Last command: none</p>
  </div>
  <div id="ble-status" class="ble-status">BLE: DISCONNECTED</div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

  <script src="ble2.js"></script>
</body>
</html>
